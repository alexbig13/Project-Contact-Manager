<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>- Movie/Book Tracker -</title>
  </head>
  <body>
    <header>
      <nav class="nav-container">
        <div class="nav-wrapper">
          <select name="categories" id="categories" class="categories">
            <option value="">sort by...</option>
            <option value="year">year</option>
            <option value="category">category</option>
            <option value="rating">rating</option>
            <option value="book">book</option>
            <option value="movie">movie</option>
          </select>
          <div class="wrapper">
            <input
              type="text"
              name="search"
              id="search"
              class="search"
              placeholder="search a movie/book"
            />
            <div class="search-container hidden"></div>
          </div>
        </div>
      </nav>
    </header>
    <main class="app-container">
      <div class="splited-content">
        <div class="books-movies-container">
          <div class="make-sure-the-btn-is-last-element">
            <h3>Books / Movies - Tracker</h3>
            <hr />
            <div class="books-movies"></div>
            <hr />
            <div class="btn-add-book-movie-wrapper">
              <button class="add-book-movie-btn">Add Book/Movie</button>
            </div>
          </div>
        </div>
        <div class="statistics-container">
          <div class="statistics">
            <h3 class="statistics-header">Info Of Book/Movie</h3>
            <div class="statistics-overview">
              <h3 class="info-name">Movie/Book Name</h3>
              <p class="info-type">Type</p>
              <p class="info-year">Year</p>
              <p class="info-desc">Desc</p>
              <p class="info-rating">Rating</p>
              <p class="info-reviews">Revies</p>
              <p class="info-status">Status</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="message-container">
      <p class="message"></p>
    </div>
    <div class="book-movie-container hidden">
      <div class="modal-contant">
        <div class="wrapper-head">
          <h3 class="book-movie-name"></h3>
          <button class="close-book-info-btn">&#10005;</button>
        </div>
        <hr class="hr-book-movie-item" />
        <div class="splited-actions">
          <div class="wrapper-text-area">
            <textarea
              id="review-text-area"
              class="review-text-area"
              placeholder="your review..."
            ></textarea>
          </div>
          <button class="submit-review-btn">submit review</button>
          <div class="wrapper">
            <p class="description-book-movie">here will be the description</p>
          </div>
          <div class="wrapper">
            <select id="star-rating" class="star-rating">
              <option value="">how many stars?</option>
              <option value="1">*</option>
              <option value="2">**</option>
              <option value="3">***</option>
              <option value="4">****</option>
              <option value="5">*****</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="add-book-movie-container hidden">
      <div class="modal-contant">
        <div class="wrapper-header">
          <h3>add book/movie</h3>
        </div>
        <hr class="hr-book-movie-item" />
        <div class="splited-actions-add-book-movie">
          <div class="actions-one">
            <div class="wrapper-actions-one">
              <label>book or movie?</label>
              <select id="book-or-movie-select" class="book-or-movie-select">
                <option value="">choose...</option>
                <option value="book">Book</option>
                <option value="movie">Movie</option>
              </select>
            </div>
            <div class="description-wrapper">
              <label>add a description: (optional)</label>
              <textarea
                id="book-movie-desc"
                class="book-movie-desc"
                placeholder="add description here"
              ></textarea>
            </div>
          </div>
          <div class="actions-two">
            <div class="form-wrapper">
              <label>The Name Of The Book/Movie:</label>
              <input
                type="text"
                id="book-movie-name"
                class="book-movie-name"
                placeholder="name?"
              />
            </div>
            <div class="form-wrapper">
              <label>The Year Of The Book/Movie:</label>
              <input
                type="number"
                id="book-movie-year"
                class="book-movie-year"
                placeholder="what year?"
              />
            </div>
            <div class="form-wrapper">
              <label>what category?</label>
              <select id="category-select-book-movie">
                <option value="">choose...</option>
                <option value="comedy">comedy</option>
                <option value="drama">drama</option>
                <option value="horror">horror</option>
                <option value="action">action</option>
                <option value="thriller">thriller</option>
                <option value="sci-fi">sci-fi</option>
                <option value="documentary">documentary</option>
                <option value="else">else</option>
              </select>
            </div>
          </div>
        </div>
        <div class="btn-wrapper">
          <button class="create-book-movie-btn">Create</button>
          <button class="close-btn-add-book-movie">Cancel</button>
        </div>
      </div>
    </div>
    <footer class="footer-container">
      <hr />
      <p class="footer-txt">&copy; 2026 Alex Broder. All rights reserved.</p>
    </footer>

    <script src="assets/javascript/script.js"></script>
  </body>
</html>
